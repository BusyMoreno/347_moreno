version: '3.8'

services:

  db:
    image: mariadb:latest
    container_name: m347-kn04b-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: falschespasswort
    networks:
      m347net:
        ipv4_address: 172.30.5.10

  web:
    image: honorednerd/347_kn04-web:latest
    container_name: m347-kn04b-web
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      m347net:
        ipv4_address: 172.30.5.20

networks:
  m347net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          ip_range: 172.30.5.0/24
          gateway: 172.30.5.254