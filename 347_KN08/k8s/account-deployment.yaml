apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account
  template:
    metadata:
      labels:
        app: account
    spec:
      containers:
      - name: account
        # Ersetze 'honorednerd' durch deinen DockerHub-Namen, falls er anders ist
        image: honorednerd/account:v2
        ports:
        - containerPort: 8080
        env:
        # Falls dein C#-Code die Datenbank-Verbindung über eine Env-Variable steuert:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
spec:
  type: NodePort
  selector:
    app: account
  ports:
    - protocol: TCP
      port: 8080      # Dieser Port ist egal für den Browser
      targetPort: 8080 # HIER MUSS DER PORT STEHEN, AUF DEM DIE APP LÄUFT
      nodePort: 30002      # <--- GEÄNDERT von ClusterIP auf NodePort    # Interne Kommunikation (reicht völlig aus)