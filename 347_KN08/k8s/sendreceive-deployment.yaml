apiVersion: apps/v1
kind: Deployment
metadata:
  name: sendreceive-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sendreceive
  template:
    metadata:
      labels:
        app: sendreceive
    spec:
      containers:
      - name: sendreceive
        image: honorednerd/sendreceive:v2
        ports:
        - containerPort: 8003
        env:
        - name: ACCOUNT_SERVICE_URL
          value: "http://account-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: sendreceive-service
spec:
  selector:
    app: sendreceive
  ports:
    - protocol: TCP
      port: 8003
      targetPort: 8003
  type: ClusterIP